
- name: Pull image
  # tags: [pull]
  shell: |
    docker pull {{ registry }}/{{ repo_namespace }}/{{ repo_image }}:{{ tag }}

- name: Stop old container
  # tags: [stop]
  shell: |
    docker rm -f demo-app || true

- name: Clean old images
  # tags: [clean]
  shell: |
    docker images \
      | grep "{{ repo_namespace }}/{{ repo_image }}" \
      | grep -v "{{ tag }}" \
      | awk '{print $3}' \
      | xargs -r docker rmi 2>/dev/null || true

- name: Run new container
  # tags: [start]
  shell: |
    docker run -d \
      --name demo-app \
      --restart always \
      -p 8080:8080 \
      {{ registry }}/{{ repo_namespace }}/{{ repo_image }}:{{ tag }}
