name: CI Test Actions Workflows
run-name: >-
  ${{ github.event_name == 'pull_request' && format('PR #{0}  CI Test Actions Workflows', github.event.number) }}

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    uses: s1line1/actions-workflows/.github/workflows/shift-left.yml@main
    with:
      acr-name: "test-acr-name"