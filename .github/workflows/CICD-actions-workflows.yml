name: CI/CD:Actions Workflows
run-name: >-
  ${{ (github.event_name == 'pull_request' && format('PR #{0} CI Test Actions Workflows {1} by {2}', github.event.number, github.event.pull_request.title, github.actor)) 
  || (github.event_name == 'push' && format('Push #{0} CD Actions Workflows {1} by {2}', github.event.number, github.event.push.title, github.actor)) }}

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        if: hashFiles('pom.xml') != ''
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn compile -q
        if: hashFiles('pom.xml') != ''

      - name: Check Formatting
        run: |
          if grep -q 'spotless-maven-plugin' pom.xml; then
            mvn spotless:check -q
          else
            echo "spotless not configured, skipping"
          fi
        if: hashFiles('pom.xml') != ''

  CICD:
    needs: lint
    name: Run shift-left and Deploy Workflows
    uses: s1line1/actions-workflows/.github/workflows/shift-left.yml@feature_fix_workflows
    with:
      acr-name: "github-actions-demo"
      run-number: ${{ github.event.number }}
      tag-sha: ${{ github.sha }}
      OSS_ENDPOINT: oss-cn-shanghai.aliyuncs.com
      OSS_BUCKET: bucket-secret
      trigger-event: ${{ github.event_name }}   # 传 "pull_request" 或 "push"
      DEPLOY_ENV: dev
    secrets:
      ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}