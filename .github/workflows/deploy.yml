name: CD
run-name: CD ${{ github.ref_name }} by ${{ github.actor }}

on:
  push:
    branches:
      - main

env:
  REGION_ID: cn-shanghai
  REGISTRY: crpi-notabmu0yl0rr8sv.cn-shanghai.personal.cr.aliyuncs.com
  NAMESPACE: s1line1-test
  IMAGE: github-actions-demo

jobs:
  check_image_tag:
    name: Get Latest Image Tag
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Get latest tag from ACR
        id: get-tag
        env:
          REGISTRY: ${{ env.REGISTRY }}
          NAMESPACE: ${{ env.NAMESPACE }}
          IMAGE: ${{ env.IMAGE }}
        run: |
          set -euo pipefail

          AUTH_HEADER=$(curl -sI "https://$REGISTRY/v2/" | grep -i "www-authenticate")
          REALM=$(echo "$AUTH_HEADER" | grep -oP 'realm="\K[^"]+')
          SERVICE=$(echo "$AUTH_HEADER" | grep -oP 'service="\K[^"]+')

          SCOPE="repository:$NAMESPACE/$IMAGE:pull"
          TOKEN=$(curl -sS -u "个人云数据:${{ secrets.ACR_PASSWORD }}" \
            "${REALM}?service=${SERVICE}&scope=${SCOPE}" | jq -r '.token // .access_token')

          TAGS_JSON=$(curl -sS -H "Authorization: Bearer $TOKEN" \
            "https://$REGISTRY/v2/$NAMESPACE/$IMAGE/tags/list")

          echo "$TAGS_JSON"

          TAG=$(echo "$TAGS_JSON" | jq -r '.tags | sort_by(. | split("_")[0] | tonumber) | last')

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "failed to get tag"
            exit 1
          fi

          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            -u 个人云数据 \
            --password-stdin \
            "${{ env.REGISTRY }}"

      - name: Get latest tag from ACR
        id: tag
        env:
          REGISTRY: ${{ env.REGISTRY }}
          NAMESPACE: ${{ env.NAMESPACE }}
          IMAGE: ${{ env.IMAGE }}
        run: |
          set -euo pipefail

          AUTH_HEADER=$(curl -sI "https://$REGISTRY/v2/" | grep -i "www-authenticate")
          REALM=$(echo "$AUTH_HEADER" | grep -oP 'realm="\K[^"]+')
          SERVICE=$(echo "$AUTH_HEADER" | grep -oP 'service="\K[^"]+')

          SCOPE="repository:$NAMESPACE/$IMAGE:pull"
          TOKEN=$(curl -sS -u "个人云数据:${{ secrets.ACR_PASSWORD }}" \
            "${REALM}?service=${SERVICE}&scope=${SCOPE}" | jq -r '.token // .access_token')

          TAGS_JSON=$(curl -sS -H "Authorization: Bearer $TOKEN" \
            "https://$REGISTRY/v2/$NAMESPACE/$IMAGE/tags/list")

          echo "$TAGS_JSON"

          TAG=$(echo "$TAGS_JSON" | jq -r '.tags | sort_by(. | split("_")[0] | tonumber) | last')

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "failed to get tag"
            exit 1
          fi

          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"

      - name: Deploy
        run: |
          echo "deploy image:${{ steps.tag.outputs.TAG }}"
