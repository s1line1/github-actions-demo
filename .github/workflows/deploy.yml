name: CI/CD shift-left -> main
run-name: shift-left -> main, Merge into ${{ github.ref_name }} by ${{ github.actor }}

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Shift Left"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image tag
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read tag
        run: |
          TAG=$(cat image_tag.txt)
          echo "TAG=$TAG"

      - name: Deploy
        run: |
          echo "deploy image:$TAG"