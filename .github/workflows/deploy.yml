name: CD
run-name: CD ${{ github.ref_name }} by ${{ github.actor }}

on:
  push:
    branches:
      - main

env:
  REGION_ID: cn-shanghai
  REGISTRY: crpi-notabmu0yl0rr8sv.cn-shanghai.personal.cr.aliyuncs.com
  NAMESPACE: s1line1-test
  IMAGE: github-actions-demo

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Install aliyun CLI
        run: |
          set -euo pipefail

          curl -sSLo aliyun.tgz \
            https://aliyun-cli.oss-cn-hangzhou.aliyuncs.com/aliyun-cli-linux-latest-amd64.tgz

          tar -xzf aliyun.tgz

          sudo mv aliyun /usr/local/bin/

          aliyun version

      - name: Get latest tag from ACR
        id: tag
        env:
          ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY_ID }}
          ACCESS_KEY_SECRET: ${{ secrets.ACCESS_KEY_SECRET }}
          REGION_ID: ${{ env.REGION_ID }}
          NAMESPACE: ${{ env.NAMESPACE }}
          IMAGE: ${{ env.IMAGE }}
        run: |
          set -euo pipefail

          aliyun configure set --profile default \
            --access-key-id "$ACCESS_KEY_ID" \
            --access-key-secret "$ACCESS_KEY_SECRET" \
            --region "$REGION_ID" \
            --output json

          echo "namespace=$NAMESPACE"
          echo "image=$IMAGE"
        
          RESULT=$(
            aliyun cr GET /repository/$NAMESPACE/$IMAGE/tags
          )

          echo "$RESULT"

          TAG=$(
            echo "$RESULT" \
            | jq -r '
                .data.tags
                | sort_by(.imageUpdate)
                | last
                | .tag
              '
          )

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "failed to get tag"
            exit 1
          fi

          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

          echo "tag=$TAG"

      - name: Deploy
        run: |
          echo "deploy image:${{ steps.tag.outputs.TAG }}"
