name: Shift Left -> main, Deploy 
run-name: Deploy ${{github.event.repository.name}} ${{ github.ref_name }} by ${{ github.actor }}

on:
  push:
    branches:
      - main

env:
  REGION_ID: cn-shanghai
  REGISTRY: crpi-notabmu0yl0rr8sv.cn-shanghai.personal.cr.aliyuncs.com
  NAMESPACE: s1line1-test
  IMAGE: github-actions-demo

jobs:
  unit_test:
    name: Run Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: |
          docker build \
            -f Dockerfile.test \
            -t springboot-test:${{ github.sha }} \
            .

      - name: Run mvn clean verify
        run: |
          docker run --rm \
            springboot-test:${{ github.sha }} \
            bash cicd/run-test.sh

  deploy:
    name: Deploy
    needs: unit_test
    if: ${{ needs.unit_test.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout deploy-ansible repo
        uses: actions/checkout@v4
        with:
          repository: s1line1/ansible-playbook
          path: ansible-playbook
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy with Ansible
        run: |
          cd ansible-playbook && \
          ansible-playbook -i github-actions-demo/inventory.ini github-actions-demo/deploy.yml \
          -e "env=dev acr_password=${{ secrets.ACR_PASSWORD }}" --private-key ~/.ssh/id_rsa -u root
